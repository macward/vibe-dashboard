services:
  dashboard:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8288}
        VITE_API_TOKEN: ${VITE_API_TOKEN:-}
        VITE_POLLING_INTERVAL: ${VITE_POLLING_INTERVAL:-10000}
    expose:
      - "3000"
    restart: unless-stopped
    user: "1000:1000"

  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - dashboard

volumes:
  caddy_data:
  caddy_config:
